spring.application.name=WorkerBackend
server.port=8090
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/worker_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# REST API Configuration (Standard camelCase)
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# HikariCP Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# Monitoring & Observability
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Caching & Session
spring.cache.type=caffeine
spring.session.store-type=none
management.health.redis.enabled=false
spring.data.redis.repositories.enabled=false

# Redis Resilience Properties
spring.data.redis.timeout=500ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-wait=200ms
spring.data.redis.lettuce.shutdown-timeout=100ms


# Security Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=5184000000
application.security.jwt.refresh-token.expiration=7776000000

# CORS Configuration
application.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://192.168.1.5:8081,http://192.168.1.5:8090,exp://192.168.1.5:8081
application.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
application.cors.allowed-headers=Authorization,Content-Type,X-XSRF-TOKEN

# Resilience4j Properties
resilience4j.circuitbreaker.instances.firebase.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.firebase.slidingWindowSize=10
resilience4j.retry.instances.db-retry.maxAttempts=3
resilience4j.retry.instances.db-retry.waitDuration=500ms
resilience4j.bulkhead.instances.api-bulkhead.maxConcurrentCalls=10



